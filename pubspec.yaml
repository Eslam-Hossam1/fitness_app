name: fitness_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  awesome_dialog: ^3.3.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  fluttertoast: ^9.0.0
  get_it: ^9.2.1
  go_router: ^17.2.1
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/pngs/
    - assets/images/svgs/
    - .env

  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Regular.ttf
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
flutter_assets:
  assets_path: assets/images
  output_path: lib/core/utils
  filename: assets.dart
  field_prefix: null
